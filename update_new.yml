---
- name: Execute Initial Setup Commands
  hosts: localhost
  become: true
  gather_facts: true

  tasks:
    # --- New Check: Verify if this is a cloud-init system ---
    - name: Check if cloud-init is present on the system
      ansible.builtin.stat:
        path: /etc/cloud
      register: cloud_init_dir

    - name: Ensure necessary directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      loop:
        - /etc/systemd/system/getty@tty1.service.d/

    # --- Conditional: Only run if /etc/cloud exists ---
    - name: Add cloud-init wait configuration
      ansible.builtin.blockinfile:
        path: /etc/systemd/system/getty@tty1.service.d/cloud-init_wait.conf
        create: true
        marker: "# {mark} ANSIBLE MANAGED BLOCK - cloud-init wait"
        block: |
          [Unit]
          After=cloud-final.service
      when: cloud_init_dir.stat.exists

    - name: Install necessary packages
      ansible.builtin.apt:
        name:
          - needrestart
          - cowsay
          - fortune-mod
          - python3
          - python3-pip
          - python3-docker
          - python3-venv
          - iftop
          - net-tools
          - unzip
          - build-essential
          - micro
          - duf
          # tldr disabled for now; Debian/RPi package availability differs from Ubuntu.
          # - tldr
          - fzf
          - bat
          - fd-find
          - libpam-modules
          - libpam-modules-bin
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Check if fastfetch is available in repositories
      ansible.builtin.command: apt-cache show fastfetch
      register: fastfetch_check
      failed_when: false
      changed_when: false

    - name: Try installing fastfetch from distro repo
      ansible.builtin.apt:
        name: fastfetch
        state: present
        update_cache: true
        cache_valid_time: 3600
      when: fastfetch_check.rc == 0
      register: fastfetch_repo_install

    - name: Install fastfetch from GitHub release when repo package is unavailable
      when: fastfetch_check.rc != 0 or (fastfetch_repo_install is defined and fastfetch_repo_install is failed)
      block:
        - name: Set fastfetch package architecture
          ansible.builtin.set_fact:
            fastfetch_arch: "{{ fastfetch_arch_map.get(ansible_architecture, '') }}"
          vars:
            fastfetch_arch_map:
              x86_64: amd64
              aarch64: arm64

        - name: Fail on unsupported fastfetch architecture
          ansible.builtin.fail:
            msg: "Unsupported architecture for fastfetch GitHub deb: {{ ansible_architecture }}"
          when: fastfetch_arch == ''

        - name: Get latest fastfetch release info
          ansible.builtin.uri:
            url: https://api.github.com/repos/fastfetch-cli/fastfetch/releases/latest
            return_content: true
            headers:
              Accept: application/vnd.github+json
              User-Agent: ansible-cloud-init
            status_code: 200
            timeout: 30
          register: fastfetch_release
          retries: 5
          delay: 10
          until: fastfetch_release.status == 200

        - name: Find fastfetch deb asset
          ansible.builtin.set_fact:
            fastfetch_deb_url: >-
              {{
                (
                  fastfetch_release.json.assets
                  | selectattr('name', 'contains', fastfetch_arch + '.deb')
                  | map(attribute='browser_download_url')
                  | first
                ) | default('')
              }}

        - name: Fail if fastfetch deb asset not found
          ansible.builtin.fail:
            msg: "Could not locate fastfetch {{ fastfetch_arch }} deb asset in GitHub release."
          when: fastfetch_deb_url == ''

        - name: Download fastfetch deb package
          ansible.builtin.get_url:
            url: "{{ fastfetch_deb_url }}"
            dest: /tmp/fastfetch.deb
            mode: '0644'

        - name: Install fastfetch from deb
          ansible.builtin.apt:
            deb: /tmp/fastfetch.deb
            state: present

    - name: Ensure needrestart auto-restarts services
      ansible.builtin.lineinfile:
        path: /etc/needrestart/needrestart.conf
        regexp: '^\s*#?\s*\$nrconf\{restart\}\s*='
        line: "$nrconf{restart} = 'a';"
        state: present
        create: true
        backup: true

    - name: Customize /etc/screenrc
      ansible.builtin.blockinfile:
        path: /etc/screenrc
        create: true
        marker: "# {mark} ANSIBLE MANAGED BLOCK - screenrc"
        block: |
          startup_message off
          nethack on
          vbell_msg ''
          termcapinfo * vb=:
          altscreen on

          # Enable arrow keys for shell history navigation
          bindkey -k up send-up
          bindkey -k dn send-down

    - name: Copy modified /etc/screenrc to /root/.screenrc
      ansible.builtin.copy:
        src: /etc/screenrc
        dest: /root/.screenrc
        remote_src: true

    - name: Get list of home directories
      ansible.builtin.find:
        paths: /home
        file_type: directory
        recurse: false
      register: user_dirs

    - name: Copy .screenrc to all home directories
      ansible.builtin.copy:
        src: /etc/screenrc
        dest: "/home/{{ item.path | basename }}/.screenrc"
        owner: "{{ item.path | basename }}"
        group: "{{ item.path | basename }}"
      loop: "{{ user_dirs.files }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Create .inputrc for root user
      ansible.builtin.copy:
        dest: /root/.inputrc
        owner: root
        group: root
        mode: '0644'
        content: |
          # Completion settings
          set completion-ignore-case on
          set show-all-if-ambiguous on
          set show-all-if-unmodified on

          # Completion display improvements
          set completion-display-width 0
          set colored-completion-prefix on
          set colored-stats on
          set menu-complete-display-prefix on

          # Editing improvements
          set enable-keypad on
          set visible-stats on

          # History settings
          set history-preserve-point on
          set history-size 10000

          # Filtered history search (Alt+Up/Down for commands starting with typed text)
          "\e[1;3A": history-search-backward
          "\e[1;3B": history-search-forward

          # Standard bindings
          # Ctrl+Left/Right for word navigation
          "\e[1;5C": forward-word
          "\e[1;5D": backward-word

          # Home/End for line navigation
          "\e[H": beginning-of-line
          "\e[F": end-of-line

          # Delete key
          "\e[3~": delete-char

          # Helpful completions
          set match-hidden-files on

    - name: Create .inputrc for all home directories
      ansible.builtin.copy:
        dest: "/home/{{ item.path | basename }}/.inputrc"
        owner: "{{ item.path | basename }}"
        group: "{{ item.path | basename }}"
        mode: '0644'
        content: |
          # Completion settings
          set completion-ignore-case on
          set show-all-if-ambiguous on
          set show-all-if-unmodified on

          # Completion display improvements
          set completion-display-width 0
          set colored-completion-prefix on
          set colored-stats on
          set menu-complete-display-prefix on

          # Editing improvements
          set enable-keypad on
          set visible-stats on

          # History settings
          set history-preserve-point on
          set history-size 10000

          # Filtered history search (Alt+Up/Down for commands starting with typed text)
          "\e[1;3A": history-search-backward
          "\e[1;3B": history-search-forward

          # Standard bindings
          # Ctrl+Left/Right for word navigation
          "\e[1;5C": forward-word
          "\e[1;5D": backward-word

          # Home/End for line navigation
          "\e[H": beginning-of-line
          "\e[F": end-of-line

          # Delete key
          "\e[3~": delete-char

          # Helpful completions
          set match-hidden-files on
      loop: "{{ user_dirs.files }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Create .local/share directory for each user
      ansible.builtin.file:
        path: "/home/{{ item.path | basename }}/.local/share"
        state: directory
        owner: "{{ item.path | basename }}"
        group: "{{ item.path | basename }}"
        mode: '0755'
      loop: "{{ user_dirs.files }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Create .local/share directory for root user
      ansible.builtin.file:
        path: /root/.local/share
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Append custom commands to each user's .bashrc
      ansible.builtin.blockinfile:
        path: "/home/{{ item.path | basename }}/.bashrc"
        create: true
        marker: "# {mark} ANSIBLE MANAGED BLOCK - MOTD + fzf helper"
        block: |
          # Added by Ansible for MOTD
          export PATH="/usr/games:$PATH"

          if [[ $- == *i* ]]; then
              clear
              fastfetch --logo none
              echo
          fi

          alias dfl='duf --only local'
          alias bat="batcat"
          alias fd="fdfind"
          alias clr='source ~/.bashrc'
          export FZF_DEFAULT_COMMAND='fdfind --type f'
          export FZF_CTRL_T_COMMAND="$FZF_DEFAULT_COMMAND"

          # fzf shell key bindings
          if [ -r /usr/share/doc/fzf/examples/key-bindings.bash ]; then
              source /usr/share/doc/fzf/examples/key-bindings.bash
          fi

          # fzf + nano helper
          fz () {
            local dir="${1:-.}"
            local file
            file=$(find "$dir" -type f 2>/dev/null | fzf --preview 'batcat --style=plain --color=always {}') || return
            sudo nano "$file"
          }
        owner: "{{ item.path | basename }}"
        group: "{{ item.path | basename }}"
      loop: "{{ user_dirs.files }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Append custom commands to root's .bashrc
      ansible.builtin.blockinfile:
        path: /root/.bashrc
        create: true
        marker: "# {mark} ANSIBLE MANAGED BLOCK - MOTD + fzf helper"
        block: |
          # Added by Ansible for MOTD
          export PATH="/usr/games:$PATH"

          if [[ $- == *i* ]]; then
              clear
              fastfetch --logo none
              echo
          fi

          alias dfl='duf --only local'
          alias bat="batcat"
          alias fd="fdfind"
          alias apb="ansible-playbook"
          export FZF_DEFAULT_COMMAND='fdfind --type f'
          export FZF_CTRL_T_COMMAND="$FZF_DEFAULT_COMMAND"

          # fzf shell key bindings
          if [ -r /usr/share/doc/fzf/examples/key-bindings.bash ]; then
              source /usr/share/doc/fzf/examples/key-bindings.bash
          fi

          # fzf + nano helper
          fz () {
            local dir="${1:-.}"
            local file
            file=$(find "$dir" -type f 2>/dev/null | fzf --preview 'batcat --style=plain --color=always {}') || return
            sudo nano "$file"
          }
        owner: root
        group: root

    - name: Ensure journald drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Configure journald size and retention limits
      ansible.builtin.copy:
        dest: /etc/systemd/journald.conf.d/99-limits.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          [Journal]
          SystemMaxUse=200M
          SystemKeepFree=500M
          MaxRetentionSec=14day

    # --- Conditional: Only run if /etc/cloud exists ---
    - name: Disable cloud-init after provisioning
      ansible.builtin.file:
        path: /etc/cloud/cloud-init.disabled
        state: touch
        owner: root
        group: root
        mode: '0644'
      when: cloud_init_dir.stat.exists