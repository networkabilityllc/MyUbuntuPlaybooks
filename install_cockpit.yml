---
- name: Install Cockpit on Ubuntu
  hosts: all
  become: true
  tasks:
    - name: Check if NetworkManager is installed
      ansible.builtin.command: systemctl status NetworkManager
      register: nm_status
      failed_when: false
      changed_when: false

    - name: Fail if NetworkManager is not installed
      ansible.builtin.fail:
        msg: "Please run the fakenet_create.yml playbook first"
      when: nm_status.rc != 0

    - name: Install Cockpit and components
      ansible.builtin.apt:
        name:
          - cockpit
          - cockpit-networkmanager
          - cockpit-storaged
          - cockpit-packagekit
          - cockpit-system
        state: present
        update_cache: true

    - name: Enable and start Cockpit socket
      ansible.builtin.systemd:
        name: cockpit.socket
        enabled: true
        state: started

    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Open Cockpit port in UFW (if active)
      community.general.ufw:
        rule: allow
        port: "9090"
        proto: tcp
      when: ansible_facts.packages['ufw'] is defined
